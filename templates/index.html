<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Prediction</title>
        <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 900px;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #1f2937;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: #6b7280;
            margin-bottom: 25px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-weight: bold;
            color: #374151;
        }

        input,
        select {
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: #4facfe;
        }

        button {
          width: 100%;
          padding: 14px;
          background: #2563eb;
          color: white;
          border: none;
          border-radius: 8px;
          font-size: 18px;
          font-weight: bold;
          cursor: pointer;
          margin-top: 25px;
          transition: 0.3s;
        }

        button:hover {
          background: #1d4ed8;
          transform: translateY(-2px);
        }

        .result {
          margin-top: 25px;
          padding: 15px;
          background: #ecfdf5;
          border-left: 5px solid #10b981;
          border-radius: 8px;
          text-align: center;
          font-size: 20px;
          font-weight: bold;
          color: #065f46;
        }

        @media (max-width: 768px) {

          .form-grid {
            grid-template-columns: 1fr;
          }

          .container {
            padding: 20px;
          }

        }

        </style>
</head>


<body>

<div class="container">

    <h1>🎓 Student Grade Prediction</h1>

    <p>
        Enter the student's academic details to predict the expected exam score.
    </p>

    <form action="/predict" method="POST">

        <div class="form-grid">
          <div class="form-group">
            <label>Hours Studied</label>
            <input type="number" name="Hours_Studied" required>
          </div>

          <div class="form-group">
            <label>Attendance (%)</label>
            <input type="number" name="Attendance" required>
          </div>

          <div class="form-group">
            <label>Parental Involvement</label>
            <select name="Parental_Involvement">
              <option value="0">Low</option>
              <option value="1">Medium</option>
              <option value="2">High</option>
            </select>
          </div>

          <div class="form-group">
            <label>Access to Resources</label>
            <select name="Access_to_Resources">
              <option value="0">Low</option>
              <option value="1">Medium</option>
              <option value="2">High</option>
            </select>
          </div>

          <div class="form-group">
            <label>Extracurricular Activities</label>
            <select name="Extracurricular_Activities">
              <option value="0">No</option>
              <option value="1">Yes</option>
            </select>

          </div>

          <div class="form-group">
            <label>Sleep Hours</label>
            <input type="number" name="Sleep_Hours" required>
          </div>
        
          <div class="form-group">
            <label>Previous Scores</label>
            <input type="number" name="Previous_Scores" required>
          </div>

          <div class="form-group">
            <label>Motivation Level</label>
            <select name="Motivation_Level">
              <option value="0">Low</option>
              <option value="1">Medium</option>
              <option value="2">High</option>
            </select>
          </div>

          <div class="form-group">
            <label>Internet Access</label>
            <select name="Internet_Access">
              <option value="0">No</option>
              <option value="1">Yes</option>
            </select>
          </div>

          <div class="form-group">
            <label>Tutoring Sessions</label>
            <input type="number" name="Tutoring_Sessions" required>
          </div>

          <div class="form-group">
            <label>Family Income</label>
            <select name="Family_Income">
              <option value="0">Low</option>
              <option value="1">Medium</option>
              <option value="2">High</option>
            </select>
          </div>

          <div class="form-group">
            <label>Teacher Quality</label>
            <select name="Teacher_Quality">
              <option value="0">Low</option>
              <option value="1">Medium</option>
              <option value="2">High</option>
            </select>
          </div>

          <div class="form-group">
            <label>School Type</label>
            <select name="School_Type">
              <option value="0">Public</option>
              <option value="1">Private</option>
            </select>
          </div>

          <div class="form-group">
            <label>Peer Influence</label>
            <select name="Peer_Influence">
              <option value="0">Negative</option>
              <option value="1">Neutral</option>
              <option value="2">Positive</option>
            </select>
          </div>

          <div class="form-group">
            <label>Physical Activity</label>
            <input type="number" name="Physical_Activity" required>
          </div>

          <div class="form-group">
            <label>Learning Disabilities</label>
            <select name="Learning_Disabilities">
              <option value="0">No</option>
              <option value="1">Yes</option>
            </select>
          </div>

          <div class="form-group">
            <label>Parental Education Level</label>
            <select name="Parental_Education_Level">
              <option value="0">High School</option>
              <option value="1">College</option>
              <option value="2">Postgraduate</option>
            </select>
          </div>

          <div class="form-group">
            <label>Distance from Home</label>
            <select name="Distance_from_Home">
              <option value="0">Near</option>
              <option value="1">Moderate</option>
              <option value="2">Far</option>
            </select>
          </div>

          <div class="form-group">
            <label>Gender</label>
            <select name="Gender">
              <option value="0">Female</option>
              <option value="1">Male</option>
            </select>
          </div>

</div>

<button type="submit">
    Predict Exam Score
</button>

    </form>

{% if prediction_text %}
<div class="result">
    {{ prediction_text }}
</div>
{% endif %}

</div>

</body>
</html>
